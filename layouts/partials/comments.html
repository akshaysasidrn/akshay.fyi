<script>
(function() {
  const stored = window.localStorage && window.localStorage.getItem("theme");
  const isDark = stored ? stored === "dark" : {{ if eq site.Params.defaultTheme "dark" }}true{{ else }}false{{ end }};

  function themeUrl(dark) {
    return dark
      ? "https://akshay.fyi/css/giscus-dark.css?v=3"
      : "https://akshay.fyi/css/giscus-light.css?v=3";
  }

  const s = document.createElement("script");
  s.src = "https://giscus.app/client.js";
  [
    ["data-repo",              "{{ site.Params.giscus.repo }}"],
    ["data-repo-id",           "{{ site.Params.giscus.repoId }}"],
    ["data-category",          "{{ site.Params.giscus.category }}"],
    ["data-category-id",       "{{ site.Params.giscus.categoryId }}"],
    ["data-mapping",           "pathname"],
    ["data-strict",            "0"],
    ["data-reactions-enabled", "1"],
    ["data-emit-metadata",     "0"],
    ["data-input-position",    "top"],
    ["data-theme",             themeUrl(isDark)],
    ["data-lang",              "en"],
    ["data-loading",           "lazy"],
    ["crossorigin",            "anonymous"],
  ].forEach(([k, v]) => s.setAttribute(k, v));
  s.async = true;
  document.currentScript.parentNode.insertBefore(s, document.currentScript);

  // Sync giscus theme whenever body class changes (dark-theme toggled)
  new MutationObserver(() => {
    const dark = document.body.classList.contains("dark-theme");
    const iframe = document.querySelector("iframe.giscus-frame");
    if (!iframe) return;
    iframe.contentWindow.postMessage(
      { giscus: { setConfig: { theme: themeUrl(dark) } } },
      "https://giscus.app"
    );
  }).observe(document.body, { attributes: true, attributeFilter: ["class"] });
})();
</script>
